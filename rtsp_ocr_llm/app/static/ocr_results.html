<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OCR Solver</title>
  <script src="/static/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --answer:  #f0f6fc;
      --muted:   #8b949e;
      --dim:     #484f58;
      --blue:    #58a6ff;
      --green:   #3fb950;
      --red:     #f85149;
      --orange:  #f0883e;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh; padding-bottom: 90px;
    }

    /* ── Header ── */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 16px; display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 100;
    }
    .back-link {
      display: flex; align-items: center; gap: 5px;
      color: var(--muted); font-size: 0.78rem; text-decoration: none;
      padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px;
      transition: color .15s, border-color .15s; white-space: nowrap;
    }
    .back-link:hover { color: var(--blue); border-color: var(--blue); }
    .header-title { font-size: 0.88rem; font-weight: 600; color: var(--blue); flex: 1; }
    #status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--dim); flex-shrink: 0;
    }
    #status-dot.working { background: var(--orange); animation: blink .6s infinite; }
    #status-dot.done    { background: var(--green);  animation: pulse 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* ── Content ── */
    main {
      max-width: 820px; margin: 0 auto;
      padding: 20px 16px 0;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* ── Capture log entries ── */
    .log-entry {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 7px; padding: 7px 12px;
      display: flex; align-items: center; gap: 8px;
      font-size: 0.77rem; color: var(--muted);
    }
    .log-n    { color: var(--blue); font-weight: 700; min-width: 26px; }
    .log-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .log-cnt  { color: var(--dim); white-space: nowrap; }

    /* ── State cards ── */
    .state-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 48px 20px; text-align: center;
    }
    .state-icon  { font-size: 1.9rem; display: block; margin-bottom: 10px; }
    .state-title { font-size: 0.94rem; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
    .state-sub   { font-size: 0.77rem; color: var(--dim); }
    .state-card.error .state-title { color: var(--red); }

    /* ── Q&A cards ── */
    .q-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .q-num {
      padding: 9px 14px 0;
      font-size: 0.67rem; font-weight: 700; color: var(--dim);
      text-transform: uppercase; letter-spacing: .8px;
    }
    .q-text {
      padding: 5px 14px 10px;
      font-size: 0.87rem; line-height: 1.55; color: var(--muted);
    }
    .q-answer-wrap {
      border-top: 1px solid var(--border); background: #0d111788;
      padding: 12px 14px 13px;
    }
    .answer-label {
      font-size: 0.61rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--dim); margin-bottom: 6px;
    }
    .answer-text {
      font-size: 0.97rem; font-weight: 700; color: var(--answer);
      line-height: 1.65; white-space: pre-wrap; word-break: break-word;
    }
    .answer-text.code {
      font-family: 'Cascadia Code','Fira Code','Consolas',monospace;
      font-size: 0.81rem; font-weight: 500; color: #e6edf3;
      background: #010409; border: 1px solid var(--border);
      border-radius: 7px; padding: 12px 14px; overflow-x: auto;
    }

    /* ── Markdown result ── */
    .md-result {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 20px;
      font-size: 0.9rem; line-height: 1.8; color: #c9d1d9;
    }
    .md-result h1,.md-result h2,.md-result h3 { color: var(--text); margin: 10px 0 5px; }
    .md-result strong { color: #f0f6fc; font-weight: 700; }
    .md-result em     { color: #d2a8ff; }
    .md-result ul,.md-result ol { padding-left: 20px; margin: 5px 0; }
    .md-result li     { margin: 3px 0; }
    .md-result code   { background: #010409; border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-family: 'Cascadia Code','Consolas',monospace; font-size: 0.81rem; color: #79c0ff; }
    .md-result pre    { background: #010409; border: 1px solid var(--border); border-radius: 7px; padding: 14px; overflow-x: auto; margin: 10px 0; }
    .md-result pre code { background: none; border: none; padding: 0; color: #e6edf3; font-size: 0.83rem; }
    .md-result blockquote { border-left: 3px solid var(--border); padding-left: 12px; color: var(--muted); margin: 6px 0; }
    .md-result p      { margin: 5px 0; }
    .md-result hr     { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

    /* scanned footnote */
    .fn-row {
      display: flex; align-items: center; gap: 7px; cursor: pointer;
      padding: 8px 12px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 0.72rem; color: var(--dim); user-select: none;
    }
    .fn-row:hover { color: var(--muted); }
    .fn-arrow { margin-left: auto; transition: transform .2s; }
    .fn-row.open .fn-arrow { transform: rotate(180deg); }
    #scanned-body {
      display: none; background: var(--surface);
      border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 8px 8px; padding: 10px 12px;
      font-size: 0.78rem; line-height: 1.7; color: var(--muted);
      white-space: pre-wrap; word-break: break-word;
    }
    #scanned-body.open { display: block; }

    /* ── Fixed bottom-left button bar ── */
    #btn-bar {
      position: fixed; bottom: 22px; left: 22px; z-index: 9999;
      display: flex; align-items: center; gap: 9px;
    }

    /* Capture button */
    #btn-capture {
      display: flex; align-items: center; gap: 7px;
      padding: 11px 16px; border-radius: 10px;
      background: #21262d; border: 1px solid var(--border);
      color: var(--text); font-size: 0.84rem; font-weight: 600;
      cursor: pointer; transition: background .15s, border-color .15s;
      box-shadow: 0 2px 10px rgba(0,0,0,.4);
    }
    #btn-capture:hover:not(:disabled) { background: #30363d; border-color: var(--blue); }
    #btn-capture:disabled { opacity: .38; cursor: not-allowed; }
    #btn-capture.spinning .cap-ico { display: none; }
    #btn-capture.spinning .btn-spin { display: block; }

    /* Solve button */
    #btn-solve {
      display: flex; align-items: center; gap: 7px;
      padding: 11px 20px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #1a7f37, #3fb950);
      color: #fff; font-size: 0.84rem; font-weight: 700;
      cursor: pointer; box-shadow: 0 2px 14px rgba(63,185,80,.35);
      transition: transform .1s, box-shadow .15s;
    }
    #btn-solve:hover:not(:disabled) {
      transform: translateY(-1px); box-shadow: 0 4px 18px rgba(63,185,80,.5);
    }
    #btn-solve:disabled {
      background: #21262d; color: var(--dim);
      border: 1px solid var(--border); box-shadow: none;
      cursor: not-allowed; transform: none;
    }
    #btn-solve.spinning .solve-ico { display: none; }
    #btn-solve.spinning .btn-spin  { display: block; }

    /* capture count badge */
    .cap-badge {
      background: var(--blue); color: #0d1117;
      border-radius: 9px; font-size: 0.67rem; font-weight: 800;
      padding: 1px 6px; min-width: 18px; text-align: center;
    }

    /* spinner */
    .btn-spin {
      width: 13px; height: 13px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.3); border-top-color: currentColor;
      animation: spin .6s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

  <header>
    <a href="/" class="back-link">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Stream
    </a>
    <span class="header-title">OCR Solver</span>
    <div id="status-dot" title="Ready"></div>
  </header>

  <main id="main-content">
    <div class="state-card" id="empty-state">
      <span class="state-icon">📷</span>
      <div class="state-title">Ready</div>
      <div class="state-sub">Press <strong>Solve</strong> for a quick answer, or press <strong>Capture</strong> multiple times then <strong>Solve</strong> to combine pages.</div>
    </div>
  </main>

  <!-- Fixed bottom-left buttons -->
  <div id="btn-bar">
    <button id="btn-capture">
      <svg class="cap-ico" width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <div class="btn-spin"></div>
      <span id="cap-label">Capture</span>
      <span class="cap-badge" id="cap-badge" style="display:none">0</span>
    </button>

    <button id="btn-solve">
      <svg class="solve-ico" width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      <div class="btn-spin"></div>
      <span id="solve-label">Solve</span>
    </button>
  </div>

  <script>
    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function looksLikeCode(s) {
      return /[\{\};]|def |class |function |return |import |#include|public |void /.test(s ?? '');
    }

    const dot       = document.getElementById('status-dot');
    const btnCap    = document.getElementById('btn-capture');
    const btnSolve  = document.getElementById('btn-solve');
    const capLabel  = document.getElementById('cap-label');
    const capBadge  = document.getElementById('cap-badge');
    const solveLabel = document.getElementById('solve-label');
    const content   = document.getElementById('main-content');

    let capCount = 0;
    let busy     = false;       // any operation running

    function setDot(s) {
      dot.className = s;
      dot.title = {idle:'Ready', working:'Working…', done:'Done'}[s] ?? s;
    }

    function updateBadge() {
      if (capCount > 0) {
        capBadge.textContent = capCount;
        capBadge.style.display = '';
        solveLabel.textContent = `Solve (${capCount})`;
      } else {
        capBadge.style.display = 'none';
        solveLabel.textContent = 'Solve';
      }
    }

    function setBusy(on) {
      busy = on;
      btnCap.disabled   = on;
      btnSolve.disabled = on;
    }

    // ── Capture ──
    btnCap.onclick = async () => {
      setBusy(true);
      btnCap.classList.add('spinning');
      capLabel.textContent = 'Capturing…';
      setDot('working');
      try {
        const r = await fetch('/ocr/capture', { method: 'POST' });
        const d = await r.json();
        if (d.status === 'busy') { setBusy(false); btnCap.classList.remove('spinning'); capLabel.textContent = 'Capture'; setDot('idle'); }
        // else wait for WS `capture` message
      } catch { setBusy(false); btnCap.classList.remove('spinning'); capLabel.textContent = 'Capture'; setDot('idle'); }
    };

    // ── Solve (smart: if captures → /ocr/solve, else → /ocr/trigger) ──
    btnSolve.onclick = async () => {
      setBusy(true);
      btnSolve.classList.add('spinning');
      solveLabel.textContent = 'Solving…';
      setDot('working');
      const endpoint = capCount > 0 ? '/ocr/solve' : '/ocr/trigger';
      try {
        const r = await fetch(endpoint, { method: 'POST' });
        const d = await r.json();
        if (d.status === 'busy') { setBusy(false); btnSolve.classList.remove('spinning'); updateBadge(); setDot('idle'); }
        // else wait for WS `lm` message
      } catch { setBusy(false); btnSolve.classList.remove('spinning'); updateBadge(); setDot('idle'); }
    };

    // ── Render results ──
    function addLogEntry(num, count, preview) {
      // Insert log entry before result cards
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="log-n">#${num}</span>
        <span class="log-text">${esc(preview || '(no text)')}</span>
        <span class="log-cnt">${count} frag${count!==1?'s':''}</span>`;
      // Prepend to main content (before cards)
      content.insertBefore(entry, content.firstChild);
    }

    function renderResults(data) {
      content.querySelectorAll('.md-result,.state-card,.fn-row,#scanned-body').forEach(el => el.remove());

      if (!data || Object.keys(data).length === 0) return;

      if (data.error) {
        content.insertAdjacentHTML('beforeend', `
          <div class="state-card error">
            <span class="state-icon">⚠</span>
            <div class="state-title">${esc(data.error)}</div>
            <div class="state-sub">Run: ollama serve</div>
          </div>`);
        return;
      }

      if (!data.markdown) {
        content.insertAdjacentHTML('beforeend', `
          <div class="state-card">
            <span class="state-icon">🔍</span>
            <div class="state-title">No response received</div>
            <div class="state-sub">Try capturing more of the problem text</div>
          </div>`);
        return;
      }

      content.insertAdjacentHTML('beforeend',
        `<div class="md-result">${marked.parse(data.markdown)}</div>`);

      if (data.raw_text) {
        content.insertAdjacentHTML('beforeend', `
          <div class="fn-row" id="fn-toggle">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            Scanned text (${data.raw_text.trim().split(/\s+/).length} words)
            <span class="fn-arrow">▾</span>
          </div>
          <div id="scanned-body">${esc(data.raw_text)}</div>`);
        document.getElementById('fn-toggle').onclick = function() {
          this.classList.toggle('open');
          document.getElementById('scanned-body').classList.toggle('open');
        };
      }
    }

    // ── WebSocket ──
    let ws, reconnectTimer;
    function connectWS() {
      clearTimeout(reconnectTimer);
      if (ws) { ws.onclose = null; ws.close(); }
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws`);
      ws.binaryType = 'blob';

      ws.onmessage = e => {
        if (e.data instanceof Blob) return;
        try {
          const msg = JSON.parse(e.data);

          if (msg.type === 'capture') {
            capCount = msg.cap_num;
            updateBadge();
            setBusy(false);
            btnCap.classList.remove('spinning');
            capLabel.textContent = 'Capture';
            setDot('idle');
            const preview = (msg.items || []).slice(0, 6).map(i => i.text).join(' ');
            addLogEntry(msg.cap_num, msg.count, preview);

          } else if (msg.type === 'capture_error') {
            setBusy(false);
            btnCap.classList.remove('spinning');
            capLabel.textContent = 'Capture';
            setDot('idle');
            renderResults({ error: msg.error, qa_pairs: [] });

          } else if (msg.type === 'lm') {
            renderResults(msg.result);
            setBusy(false);
            btnSolve.classList.remove('spinning');
            updateBadge();
            setDot('done');
            setTimeout(() => setDot('idle'), 3000);

          } else if (msg.type === 'cleared') {
            capCount = 0; updateBadge();
          }
        } catch {}
      };

      ws.onerror = () => {};
      ws.onclose = () => { reconnectTimer = setTimeout(connectWS, 3000); };
    }

    // ── Initial load ──
    async function loadInitial() {
      try {
        const [capR, lmR] = await Promise.all([
          fetch('/ocr/captures'),
          fetch('/lm/latest'),
        ]);
        const caps = await capR.json();
        const lm   = await lmR.json();
        if (caps.captures > 0) { capCount = caps.captures; updateBadge(); }
        if (lm && (lm.markdown || lm.error)) {
          renderResults(lm); setDot('done');
          setTimeout(() => setDot('idle'), 2000);
        }
      } catch {}
    }

    loadInitial();
    connectWS();
  </script>
</body>
</html>
